version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    platform: linux/amd64
    container_name: aims-postgres
    environment:
      - POSTGRES_DB=aims
      - POSTGRES_PASSWORD=AIMS@2025!
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 10s
  aims-api:
    image: 451834067376.dkr.ecr.ap-southeast-1.amazonaws.com/aims-api:latest
    platform: linux/amd64
    build:
      context: .
      dockerfile: src/AIMS.BackendServer/Dockerfile
    container_name: aims-api
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=aims;Username=postgres;Password=AIMS@2025!;Pooling=true;
      - JwtSettings__Key=AIMS_SECRET_KEY_2025_DEHA_VIET_NAM_VERY_LONG_MIN32CHARS
      - JwtSettings__Issuer=AIMS.BackendServer
      - JwtSettings__Audience=AIMS.WebPortal
      - JwtSettings__ExpiryMinutes=60
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  aims-web:
    image: 451834067376.dkr.ecr.ap-southeast-1.amazonaws.com/aims-web:latest
    platform: linux/amd64
    build:
      context: .
      dockerfile: src/AIMS.WebPortal/Dockerfile
    container_name: aims-web
    ports:
      - "5005:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ApiSettings__BaseUrl=http://aims-api:8080
    volumes:
      - webkeys:/app/dataprotection-keys
    depends_on:
      - aims-api
    restart: always

volumes:
  pgdata:
  webkeys: